appId: com.seekingdata.pro
productName: SeekingData Pro
copyright: Copyright © 2024 SeekingData Team

directories:
  buildResources: resources
  output: dist

files:
  - dist/**/*
  - dist-electron/**/*
  - resources/**/*
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,readme}"
  - "!**/node_modules/.cache"
  - "!**/{.DS_Store,.git,.hg,.svn,CVS,RCS,SCCS,__pycache__,thumbs.db,.gitignore,.gitattributes}"

extraResources:
  - from: backend
    to: backend
    filter:
      - "**/*"
      - "!.venv"
      - "!__pycache__"
      - "!*.pyc"
      - "!.env"

# macOS 配置
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows 配置
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ${name}-Setup-${version}.${ext}

# Linux 配置
linux:
  icon: resources/icons
  category: Development
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
    - target: rpm
      arch:
        - x64

appImage:
  artifactName: ${name}-${version}-${arch}.${ext}

deb:
  artifactName: ${name}_${version}_${arch}.${ext}
  depends:
    - gconf2
    - gconf-service
    - libnotify4
    - libappindicator1
    - libxtst6
    - libnss3

rpm:
  artifactName: ${name}-${version}.${arch}.${ext}

# 发布配置
publish: null

# 自动更新配置
buildDependenciesFromSource: false
nodeGypRebuild: false
npmRebuild: true
